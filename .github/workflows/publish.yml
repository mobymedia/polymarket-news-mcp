name: Publish to PyPI
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: rm -rf dist && python -m pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
